{{ "<!-- About Section -->" | safeHTML }}
<section class="success" id="project">
    <div class="container">
        <div class="row">
            <div class="col-lg-12 text-center">
                <h2>{{ with .Site.Params.project.title }}{{.}}{{ end }}</h2>
                <hr class="star-light">
            </div>
        </div>
    <div class="row">
        {{ range .Site.Params.project.list }}
            <div class="col-sm-4 portfolio-item">
                <a href="{{.url}}" class="portfolio-link" target="_blank" data-toggle="modal">
                    <img src="img/portfolio/{{ .img }}" class="img-responsive">
                    <p class="title">{{.title}}</p>
                </a>
            </div>
        {{ end }}
    </div>
</section>
