{{ "<!-- Portfolio Grid Section -->" | safeHTML }}
<section id="portfolio">
    <div class="container">
        <div class="row">
            <div class="col-lg-12 text-center">
                <h2>{{ with .Site.Params.portfolio.title }}{{.}}{{end}}</h2>
                <hr class="star-primary">
            </div>
        </div>
        <div class="row">
            {{ range .Site.Params.portfolio.ProjectList }}
            <div class="col-sm-4 portfolio-item">
                <a href="{{.url}}" class="portfolio-link" data-toggle="modal">
                    <img src="img/portfolio/{{ .img }}" class="img-responsive">
                    <p class="title">{{.title}}</p>
                </a>
            </div>
            {{ end }}
        </div>
    </div>
</section>

<style>
    .portfolio-item .portfolio-link {
        transition: all .3s;
    }
    .portfolio-item .portfolio-link:hover {
        transform: scale(1.1);
        transition: all .3s;
    }
    .portfolio-item .portfolio-link .title{
            text-align: center;
            margin-top: 20px;
    }
    .portfolio-item .portfolio-link .img-responsive {
        border-radius: 10px;
    }
    .portfolio-item .portfolio-link .img-responsive:hover {
        animation: none;
    }
</style>
