<script>
    let headerImg = document.getElementById('img-responsive');
    let title = document.getElementById('name-title');
    let starLight = document.getElementById('star-light');
    let skills = document.getElementById('skills');

    headerImg.onmouseover = () => {
        title.classList.add('title-animation')
        starLight.classList.add('line-animation')
        skills.classList.add('skills-animation')
    }

    headerImg.onmouseout = () => {
        title.classList.remove('title-animation')
        starLight.classList.remove('line-animation')
        skills.classList.remove('skills-animation')
    }
</script>

<style>
    .img-responsive {
        border-radius: 50%; 
        box-shadow: 0 0 10px #ff8329; 
    }

    .img-responsive:hover {
        animation: ani 2s linear infinite;
    }

    @keyframes ani {
        0%{
                box-shadow: 0 0 10px #ff8329;
                transform: scale(1);
        }
        25%{
                box-shadow: 0 0 20px #ff8329;
                transform: scale(1.1);
        }
        50%{
                box-shadow: 0 0 40px #ff8329;
                transform: scale(1.2);

        }
        75%{
                box-shadow: 0 0 20px #ff8329;
                transform: scale(1.1);

        }
        100%{
            box-shadow: 0 0 10px #ff8329;
            transform: scale(1);
        }
    }

    .title-animation {
        animation: title-animation 2s linear infinite;
    }

    .line-animation {
        animation: line-animation 2s linear infinite;
    }

    .skills-animation {
        animation: skills-animation 3s ease-in-out infinite;
    }

    @keyframes title-animation {
        0% {
            margin-left: 0px;
        }

        25% {
            margin-left: 50px;
        }

        50% {
            margin-left: 100px;
        }

        75% {
            margin-left: 50px;
        }

        100% {
            margin-left: 0px;
        }
    }

    @keyframes line-animation {
        0% {
            transform: translate(0px)
        }

        25% {
            transform: translate(-30px)
        }

        50% {
            transform: translate(-80px)
        }

        75% {
            transform: translate(-30px)
        }

        100% {
            transform: translate(0px)
        }
    }

    @keyframes skills-animation {
        0% {
            margin-left: 0px;
        }

        50% {
            margin-left: 300px;
        }

        100% {
            margin-left: 0px;
        }
    }
</style>

<section id="contact">
    <div class="container">
        <div class="row">
            <div class="col-lg-12 text-center">
                <h2>联系我</h2>
                <hr class="star-primary">
            </div>
        </div>
        <div class="row">
            <div class="col-lg-8 col-lg-offset-2">
                <form  action="https://formspree.io/f/mleabgzd" method="POST" name="sentMessage" id="contactForm" novalidate>
                    <div class="row control-group">
                        <div class="form-group col-xs-12 floating-label-form-group controls">
                            <label class="form-label">姓名：</label>
                            <input type="text" name="name" class="form-control" placeholder="请输入姓名：" id="name" required data-validation-required-message="">
                            <p class="help-block text-danger"></p>
                        </div>
                    </div>
                    <div class="row control-group">
                        <div class="form-group col-xs-12 floating-label-form-group controls">
                            <label  class="form-label">电子邮件：</label>
                            <input type="email" name="_replyto" class="form-control" placeholder="请输入电子邮件：" id="email" required data-validation-required-message="">
                            <p class="help-block text-danger"></p>
                        </div>
                    </div>
                    <div class="row control-group">
                        <div class="form-group col-xs-12 floating-label-form-group controls">
                            <label  class="form-label">电话：</label>
                            <input type="tel" class="form-control" placeholder="请输入电话：" id="phone" required data-validation-required-message="">
                            <p class="help-block text-danger"></p>
                        </div>
                    </div>
                    <div>
                        <input type="hidden"  name="_subject" value="New submission!">
                        <input type="text" name="_gotcha" style="display:none" />
                    </div>
                    <div class="row control-group">
                        <div class="form-group col-xs-12 floating-label-form-group controls">
                            <label  class="form-label">内容：</label>
                            <textarea rows="5" name="message" class="form-control" placeholder="请输入内容：" id="message" required data-validation-required-message=""></textarea>
                            <p class="help-block text-danger"></p>
                        </div>
                    </div>
                    <br>
                    <div id="success"></div>
                    <div class="row">
                        <div class="form-group col-xs-12"  style="text-align: center;">
                            <button type="submit" class="btn btn-success btn-lg" style="width: 200px">提交</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>
